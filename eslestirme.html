<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أَكْمِل الجُمْلَة‫.‬ - 4 Seviye</title>
    
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    
<style>
    /* 1. ARAKOM FONTU */
    @font-face {
        font-family: 'Arakom';
        src: url('ARAKOMs.TTF') format('truetype'),
             url('arakom.ttf') format('truetype'),
             url('Arakom.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    /* 2. GOOGLE FONTS (Markazi Text & Tajawal) */
    @import url('https://fonts.googleapis.com/css2?family=Markazi+Text:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap');
        
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body, .buton, .drag-ghost, .kart-bitis, h1, #level-indicator, .cumle-baslangic {
        font-family: 'Arakom', 'Tajawal', 'Markazi Text', serif;
        font-weight: 500; 
    }

    body {
        background: linear-gradient(135deg, #f4f7f6, #e5ece9);
        color: #2c3e50;
        height: 100vh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        justify-content: space-between; /* Ekranı dikeyde kusursuz böler */
        padding: 2vh 3vw;
        overflow: hidden; /* Taşma ve scroll engellendi */
    }

    #game-container {
        display: contents; /* Konteynır tamamen görünmez, body düzenini devralır */
    }
    
  /* Üst Başlık Alanı (Geri, Başlık ve Tur Bilgisi Aynı Satırda) */
    header { 
        flex: 0 0 auto; 
        width: 100%;
        display: flex;
        flex-direction: row; /* Elemanları yan yana dizer */
        justify-content: space-between; /* Sola, ortaya ve sağa kusursuz dağıtır */
        align-items: center; /* Dikeyde tam ortalar */
        margin-bottom: 2.5vh;
        padding: 0 1vw;
    }

   /* Ana Yönerge (Tam Ortada) */
    h1 { 
        color: #00796b; 
        font-size: clamp(2.2rem, 6vh, 3.8rem); 
        line-height: 1.1; 
        margin: 0;
        text-align: center;
        flex-grow: 1; /* Kalan boşluğu kaplayıp kendini merkeze iter */
    }
    
   /* Tur Bilgisi (Satırın sağında) */
    #level-indicator { 
        position: relative;
        font-size: clamp(1.4rem, 2.5vh, 2rem); 
        color: #00796b; 
        background: #ffffff;
        border: 1px solid #e2e8f0;
        padding: 0 25px;
        border-radius: 30px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        margin: 0;
        white-space: nowrap;
        flex-shrink: 0; /* Küçülmesini engeller */
    }

    /* Ana Etkileşim Alanı - Kalan tüm boşluğu kaplar */
    .etkilesim-alani { 
        flex: 1 1 auto; 
        display: flex; 
        gap: 3vw; 
        align-items: stretch; /* Dikeyde uzamasını sağlar */
        min-height: 0; 
    }

    /* Cümle Kutusu */
    .cumleler-kutusu { 
        flex: 2.5; 
        display: flex; 
        flex-direction: column; 
        justify-content: space-between; /* Satırları dikeyde eşit dağıtır */
        gap: 2vh; /* Aralarındaki boşluk */
    }

    /* Seçenekler Kutusu - Sadece kelimelerin dağıldığı açık alan */
    .secenekler-kutusu { 
        flex: 1; 
        background: transparent; 
        border: none; 
        padding: 0;
        display: flex; 
        flex-direction: column; 
        justify-content: space-around; /* Kelimeleri dikeyde mükemmel yayar */
        align-items: center; 
    }
    
    /* Cümle Satırları - flex: 1 ile dikey boşlukları emerler */
    .cumle-satiri { 
        flex: 1; 
        display: flex; 
        align-items: center; 
        background-color: #ffffff; 
        border-radius: 16px; 
        padding: 0 2vw; 
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    /* Büyütülmüş Cümle Yazısı */
    .cumle-baslangic { 
        font-size: clamp(2.2rem, 7vh, 4.2rem); 
        line-height: 1.3; 
        color: #1e293b; 
        text-align: right; 
        margin-left: 20px; 
        flex-grow: 1; 
    }
    
    .birakma-alani { 
    flex: 0 0 35%; 
    min-width: 220px; 
    height: 93%; /* %75 olan bu değeri artırarak dikey boyutu büyüttük */
    border-radius: 12px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    position: relative; 
    border: 2px dashed #94a3b8; 
    background-color: #f1f5f9;
    transition: background-color .2s; 
}

    .drag-over { 
        background-color: #ccfbf1; 
        border-color: #14b8a6; 
    }
    
    .birakma-alani.dogru { 
        background-color: transparent; 
        border: 2px solid transparent; 
    }

    /* 1. Sürüklenebilir Kelimelerin Yeni Boyutu */
.kart-bitis {
    width: max-content; /* Sadece kelimenin boyutu kadar yer kapla */
    min-width: 150px;
    padding: 0.5vh 1vw; /* Etrafında biraz boşluk */
    font-size: clamp(2rem, 6vh, 3.8rem); /* 4vh değeri 6vh olarak büyütüldü */
    white-space: nowrap; /* Kelimenin iki satıra bölünmesini engeller */
    background-color: #ffffff;
    border: 2px solid #cbd5e1;
    border-radius: 12px;
    color: #0f172a;
    cursor: grab;
    transition: opacity .2s, box-shadow .2s, border-color .2s;
    user-select: none;
    -webkit-user-select: none;
    box-shadow: 0 4px 8px rgba(0,0,0,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
}
    
    .kart-bitis:hover:not(.siluet) { 
        box-shadow: 0 6px 12px rgba(0,0,0,.08); 
        border-color: #94a3b8;
    }

    /* Sürüklenirken boyut asla değişmez */
    .kart-bitis.dragging { 
        opacity: .85; 
        box-shadow: 0 12px 24px rgba(0,0,0,.15); 
        border-color: #00796b;
    }
    
    /* Bırakma alanına oturduğunda alanı tam kaplaması için */
    .kart-bitis.dogru { 
        background-color: #dcfce7; 
        border-color: #22c55e; 
        color: #166534;
        width: 100%; 
        height: 100%;
        padding: 0;
        margin: 0;
        border-radius: 10px;
        box-shadow: none;
    }
    
    /* 2. Sürükleme Esnasında Boyut Değişmemesi İçin Klon Güncellemesi */
.drag-ghost {
    width: max-content !important; 
    padding: 0.5 !important;
    white-space: nowrap !important;
    font-size: clamp(2rem, 6vh, 3.8rem) !important; /* Klon da 6vh olarak güncellendi */
    transform: scale(1) !important; 
    opacity: 0.95;
    background: #ffffff;
    border: 2px solid #00796b;
    border-radius: 12px;
    box-shadow: 0 12px 24px rgba(0,0,0,.15);
    pointer-events: none;
    position: absolute;
    top: -9999px; 
    left: -9999px;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
}

    /* Kontrol Buton Alanı - Alt köşeye sabit */
    .buton-alani { 
        flex: 0 0 12vh;
        display: flex; 
        justify-content: center; 
        align-items: center; 
        margin-top: 1vh;
    }

    .buton { 
        display: inline-flex; 
        align-items: center;
        justify-content: center;
        padding: 1.5vh 5vw; 
        font-size: clamp(1.8rem, 3vh, 2.6rem); 
        color: #fff; 
        background-color: #00796b; 
        border: none; 
        border-radius: 50px; 
        cursor: pointer; 
        transition: all .3s ease; 
        box-shadow: 0 4px 12px rgba(0, 121, 107, 0.2);
    }

    .buton:hover { 
        background-color: #004d40; 
        transform: translateY(-2px);
    }

    #checkBtn { 
        background-color: #10b981; 
        font-size: clamp(2.2rem, 4vh, 3.5rem); 
        padding: 1vh 6vw; 
        display: none; 
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }
    #checkBtn:hover { background-color: #059669; }

    /* Geri Butonu */
/* Geri Butonu (Artık serbest değil, satırın solunda) */
    #backBtn { 
        position: relative; /* Eski 'absolute' iptal edildi */
        top: auto;
        left: auto;
        background: #ffffff; 
        border: 1px solid #e2e8f0; 
        border-radius: 50%;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer; 
        transition: all 0.2s ease;
        flex-shrink: 0; /* Küçülmesini engeller */
    }
    #backBtn svg { width: 32px; height: 32px; fill: #00796b; }
    #backBtn:hover { background: #f1f5f9; transform: scale(1.05); }
    
    /* Tam Ekran Katmanları */
    #end-screen, #start-screen { 
        position: absolute; 
        top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(244,247,246,0.97); 
        backdrop-filter: blur(4px);
        display: none; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
        z-index: 2000; 
        text-align: center; 
    }
    #start-screen { z-index: 3000; display: flex; }
    
    #end-screen h2 { font-size: clamp(3.5rem, 6vh, 5.5rem); color: #00796b; margin-bottom: 2vh; }
    #end-screen p { font-size: clamp(2rem, 3.5vh, 3.5rem); color: #334155; margin-bottom: 4vh; }
    #startBtn { font-size: clamp(2.5rem, 5vh, 4.5rem); padding: 2vh 7vw; animation: pulseBtn 2s infinite; }
    
    @keyframes pulseBtn { 
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 121, 107, 0.3); } 
        50% { transform: scale(1.03); box-shadow: 0 0 0 12px rgba(0, 121, 107, 0); } 
        100% { transform: scale(1); } 
    }
    
    @keyframes vibrate { 
        0%, 100% { transform: translateX(0); } 
        20%, 60% { transform: translateX(-5px); } 
        40%, 80% { transform: translateX(5px); } 
    }
    
    .yanlis-anim { 
        animation: vibrate .4s; 
        background-color: #fef2f2 !important; 
        border-color: #ef4444 !important; 
        color: #991b1b !important;
    }

    /* Mobil / Dikey Ekranlar */
    @media (max-width: 992px) {
        body { padding: 1vh 2vw; }
        .etkilesim-alani { flex-direction: column; gap: 1.5vh; }
        .cumleler-kutusu { flex: 2; gap: 1vh; }
        .secenekler-kutusu { flex: 1; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .kart-bitis { width: max-content; height: auto; padding: 1vh 3vw; font-size: clamp(1.6rem, 3vh, 2.4rem); }
        .birakma-alani { min-width: 140px; height: 65%; }
        .cumle-satiri { padding: 0 3vw; }
        .cumle-baslangic { font-size: clamp(1.6rem, 3vh, 2.8rem); }
    }
</style>
</head>
<body>

    <div id="game-container">
        
        <div id="start-screen">
            <button id="startBtn" class="buton">اِبْدَأْ</button>
        </div>

       <header>
            <div id="level-indicator">الجَوْلَة 1 / 4</div>
            
            <h1>أَكْمِل الجُمْلَة‫.‬</h1>
            
            <button id="backBtn" onclick="window.location.href='index.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" />
                </svg>
            </button>
        </header>
        
        <div class="etkilesim-alani">
            <div class="cumleler-kutusu" id="questions-box"></div>
            <div class="secenekler-kutusu" id="options-box"></div>
        </div>
        
        <div class="buton-alani">
            <button id="checkBtn" class="buton">&#10004;</button> 
        </div>

        <div id="end-screen">
            <h2>مُمْتاز!</h2>
            <p>لَقَدْ أَنْهَيْتَ كُلّ المَراحِل بِنَجاح.</p>
            <button class="buton" onclick="location.reload()">إِعادَة</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const gameData = [
                {
                    questions: [
                        { q: "تُرْكِيا بَلَد كَبير وَ ...", a: "جَميل." }, 
                        { q: "أَنْقَرَة مَدينَة كَبيرَة، وَهِي ...", a: "عاصِمَة تُرْكِيا." },
                        { q: "تَقَعُ سينوب في ...", a: "شَمال تُرْكِيا." },
                        { q: "تَقَعُ مَرْسين في ...", a: "جَنوب تُرْكِيا." },
                        { q: "تَقَعُ قونْيا في ...", a: "وَسَط تُرْكِيا." } 
                    ],
                    distractor: "جَنوب" 
                },
                {
                    questions: [
                        { q: "تَشْتَهِرُ بورْصَة بِـ ...", a: "كَباب إِسْكَنْدَر." }, 
                        { q: "تَشْتَهِرُ قَيْصَري بِـ ...", a: "المانْتي." },
                        { q: "مَرْسين مَشْهورَة بِـ ...", a: "التَّانْتوني." },
                        { q: "آفْيون مَشْهورَة بِـ ...", a: "القِشْطَة." },
                        { q: "تَشْتَهِرُ أَرْضُروم بِـ ...", a: "كَباب جاغ." }
                    ],
                    distractor: "تَقَعُ" 
                },
                {
                    questions: [
                        { q: "مُراد مِنْ مَدينَة ...", a: "قونْيا." }, 
                        { q: "حَيّ مُراد بَعيد عَنْ ...", a: "مُتْحَف مَوْلانا." }, 
                        { q: "أَنْقَرَة أَكْبَر مِنْ ...", a: "بورْصَة." },
                        { q: "إِسْطَنْبول مَدينَة مُزْدَحِمَة ...", a: "جِدًّا." }, 
                        { q: "حَيّ مُراد مُزْدَحِم بِـ ...", a: "السُّكّان." } 
                    ],
                    distractor: "أَنْقَرَة" 
                },
                {
                    questions: [
                        { q: "صَلَّيْتُ الفَجْر في السّاعَة ...", a: "السّادِسَة وَالنِّصْف." },
                        { q: "تَناوَلْتُ الفَطور في السّاعَة ...", a: "السّابِعَة." },
                        { q: "وَصَلْتُ إِلى المَدْرَسَة في السّاعَة ...", a: "الثّامِنَة." },
                        { q: "أَرْجِعُ مِن المَدْرَسَة في السّاعَة ...", a: "الثّالِثَة وَالثُّلُث." },
                        { q: "أَنام في السّاعَة ...", a: "العاشِرَة وَالثُّلُث." }
                    ],
                    distractor: "تَوَضَّأْتُ" 
                }
            ];

            let currentRoundIndex = 0;
            let doluSlotSayisi = 0;
            
            const questionsBox = document.getElementById('questions-box');
            const optionsBox = document.getElementById('options-box');
            const checkBtn = document.getElementById('checkBtn');
            const levelIndicator = document.getElementById('level-indicator');
            const endScreen = document.getElementById('end-screen');
            const startScreen = document.getElementById('start-screen');
            const startBtn = document.getElementById('startBtn');

            let audioCtx = null; 
            
            function initAudio() {
                if (audioCtx) return; 
                try { 
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                } 
                catch (e) { console.error('Audio API hatası'); }
            }

            startBtn.addEventListener('click', () => {
                initAudio();
                const yonergeSes = new Audio('yonergeeslestirme.wav');
                yonergeSes.play().catch(e => console.log("Ses dosyası bulunamadı:", e));
                startScreen.style.display = 'none';
                loadRound(0);
            });

            function playSound(type) {
                if (!audioCtx) return; 
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                gainNode.gain.setValueAtTime(0.3, now); 
                if (type === 'drop') {
                    oscillator.type = 'triangle'; oscillator.frequency.setValueAtTime(300, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    oscillator.start(now); oscillator.stop(now + 0.2);
                } else if (type === 'wrong') {
                    oscillator.type = 'square'; oscillator.frequency.setValueAtTime(150, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    oscillator.start(now); oscillator.stop(now + 0.2);
                } else if (type === 'win') {
                    oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(500, now);
                    oscillator.frequency.exponentialRampToValueAtTime(1000, now + 0.1);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    oscillator.start(now); oscillator.stop(now + 0.5);
                }
            }

            function loadRound(roundIdx) {
                questionsBox.innerHTML = '';
                optionsBox.innerHTML = '';
                checkBtn.style.display = 'none';
                doluSlotSayisi = 0;
                
                if (roundIdx >= gameData.length) {
                    endScreen.style.display = "flex";
                    playSound('win');
                    return;
                }

                levelIndicator.textContent = `الجَوْلَة ${roundIdx + 1} / ${gameData.length}`;
                
                const currentData = gameData[roundIdx];
                const questions = currentData.questions;
                
                questions.forEach((item, index) => {
                    const row = document.createElement('div');
                    row.className = 'cumle-satiri';
                    
                    const textDiv = document.createElement('div');
                    textDiv.className = 'cumle-baslangic';
                    textDiv.textContent = item.q;
                    
                    const dropZone = document.createElement('div');
                    dropZone.className = 'birakma-alani';
                    dropZone.dataset.id = index; 
                    
                    row.appendChild(textDiv);
                    row.appendChild(dropZone);
                    questionsBox.appendChild(row);
                });

                let optionsArr = questions.map((item, index) => ({ text: item.a, id: index }));
                optionsArr.push({ text: currentData.distractor, id: 99 });
                optionsArr.sort(() => Math.random() - 0.5);

                optionsArr.forEach(opt => {
                    const card = document.createElement('div');
                    card.className = 'kart-bitis';
                    card.draggable = true;
                    card.dataset.id = opt.id;
                    card.textContent = opt.text;
                    
                    card.addEventListener('dragstart', dragStartHandler);
                    card.addEventListener('dragend', dragEndHandler);
                    card.addEventListener('touchstart', dragStartHandler, {passive: false});
                    
                    optionsBox.appendChild(card);
                });

                const zones = document.querySelectorAll('.birakma-alani');
                zones.forEach(zone => {
                    zone.addEventListener('dragover', dragOver);
                    zone.addEventListener('dragleave', dragLeave);
                    zone.addEventListener('drop', dropHandler);
                });
                
                optionsBox.addEventListener('dragover', (e) => e.preventDefault());
                optionsBox.addEventListener('drop', dropToContainer);
            }

            let draggedCard = null;
            let ghostElement = null;

            function dragStartHandler(e) {
                if (e.target.classList.contains('siluet') || e.target.classList.contains('dogru')) {
                    e.preventDefault(); return;
                }
                draggedCard = e.target;
                if (e.dataTransfer) e.dataTransfer.setData('text/plain', e.target.dataset.id);
                
                if (!('ontouchstart' in window)) {
                    ghostElement = e.target.cloneNode(true);
                    ghostElement.classList.add('drag-ghost');
                    document.body.appendChild(ghostElement);
                    e.dataTransfer.setDragImage(ghostElement, e.offsetX, e.offsetY);
                }
                setTimeout(() => { if(draggedCard) draggedCard.classList.add('dragging'); }, 0);
            }

            function dragEndHandler(e) {
                if (ghostElement) ghostElement.remove();
                if (draggedCard) draggedCard.classList.remove('dragging');
                draggedCard = null;
            }

            function dragOver(e) {
                e.preventDefault();
                if (!this.querySelector('.kart-bitis')) {
                    this.classList.add('drag-over');
                }
            }

            function dragLeave(e) {
                this.classList.remove('drag-over');
            }

            function dropHandler(e) {
                e.preventDefault();
                this.classList.remove('drag-over');
                
                if (!draggedCard || this.querySelector('.kart-bitis')) return;
                
                if (draggedCard.parentElement.classList.contains('secenekler-kutusu')) {
                    this.appendChild(draggedCard);
                    doluSlotSayisi++;
                } else {
                    this.appendChild(draggedCard);
                }
                
                playSound('drop');
                checkButtonState();
            }

            function dropToContainer(e) {
                e.preventDefault();
                if (draggedCard && draggedCard.parentElement.classList.contains('birakma-alani')) {
                    optionsBox.appendChild(draggedCard);
                    doluSlotSayisi--;
                    checkButtonState();
                }
            }

            function checkButtonState() {
                const currentQuestionCount = gameData[currentRoundIndex].questions.length;
                if (doluSlotSayisi === currentQuestionCount) {
                    checkBtn.style.display = 'block';
                } else {
                    checkBtn.style.display = 'none';
                }
            }

            checkBtn.addEventListener('click', () => {
                let tumuDogru = true;
                const zones = document.querySelectorAll('.birakma-alani');
                
                zones.forEach(zone => {
                    const card = zone.querySelector('.kart-bitis');
                    if (!card) return;

                    card.classList.remove('yanlis-anim', 'dogru');

                    if (card.dataset.id === zone.dataset.id) {
                        card.classList.add('dogru');
                        card.draggable = false;
                        card.style.cursor = 'default';
                        zone.classList.add('dogru'); 
                    } else {
                        tumuDogru = false;
                        card.classList.add('yanlis-anim');
                        playSound('wrong');
                        
                        setTimeout(() => {
                            card.classList.remove('yanlis-anim');
                            optionsBox.appendChild(card);
                            doluSlotSayisi--;
                            checkButtonState();
                        }, 800);
                    }
                });

                if (tumuDogru) {
                    playSound('win');
                    checkBtn.style.display = 'none';
                    
                    setTimeout(() => {
                        currentRoundIndex++;
                        loadRound(currentRoundIndex);
                    }, 1500); 
                }
            });
        });
    </script>
</body>
</html>
