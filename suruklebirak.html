<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نَشاط: الوَحْدَة الثّانِيَة</title>
    <link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: 'Arakom';
            src: url('ARAKOM.TTF') format('truetype'),
                 url('arakom.ttf') format('truetype'),
                 url('Arakom.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* --- YENİ TASARIM RENK VE DEĞİŞKENLERİ --- */
        :root {
            --primary-bg: #e0c3fc;
            --secondary-bg: #8ec5fc;
            --surface-color: rgba(255, 255, 255, 0.85);
            --surface-border: rgba(255, 255, 255, 0.4);
            --text-dark: #2c3e50;
            --text-muted: #596275;
            --danger-color: #ff4757;
            --success-color: #2ed573;
            
            --font-arabic: 'Arakom', 'Markazi Text', 'Tahoma', 'Arial', sans-serif;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 15px 35px rgba(0, 0, 0, 0.15);
            --radius-large: 24px;
            --radius-medium: 16px;
            --radius-pill: 50px;
        }

        /* Arka Plan ve Temel Ayarlar */
        body {
            font-family: var(--font-arabic);
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-weight: 400;
            color: var(--text-dark);
        }

        /* Ana Konteyner (Cam Efektli Modern Panel) */
        .activity-container {
            position: relative;
            background: var(--surface-color);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            display: none; 
            flex-direction: column;
            width: 98vw;
            height: calc(98vw * 9 / 16); 
            max-height: 98vh;
            max-width: calc(98vh * 16 / 9);
        }
        
        /* Header Alanı */
        .header {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid var(--surface-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            direction: rtl; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            z-index: 10;
        }

        .right-section {
            display: flex;
            align-items: center;
            gap: 25px;
            flex-grow: 1;
        }

        #instruction-text {
            font-size: 2.6rem;
            color: var(--text-dark);
            margin: 0;
            line-height: 1.1;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .lives-container {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255,255,255,0.6);
            padding: 5px 15px;
            border-radius: var(--radius-pill);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .heart {
            font-size: 2.2rem;
            color: var(--danger-color);
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(255, 71, 87, 0.3));
            transition: all 0.3s ease;
        }

        /* Butonlar */
        .back-button-container {
            display: flex;
            gap: 12px;
            direction: ltr;
        }     
        
        .back-button, #fullscreen-btn {
            background: #ffffff;
            color: var(--text-muted);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            width: clamp(45px, 8vmin, 55px);
            height: clamp(45px, 8vmin, 55px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .back-button:hover, #fullscreen-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
            color: #000;
        }

        .back-button svg, #fullscreen-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        #fullscreen-btn .icon-open { display: block; }
        #fullscreen-btn .icon-close { display: none; }
        body.fullscreen #fullscreen-btn .icon-open { display: none; }
        body.fullscreen #fullscreen-btn .icon-close { display: block; }

        /* Asıl Etkinlik Alanı */
        .activity-area {
            flex-grow: 1;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .categorize-container {
            display: flex;
            flex-direction: row-reverse; 
            width: 100%;  
            flex-grow: 1; 
            gap: 25px;
        }

        /* Sol Taraf: Hedef Kutular */
        .drop-zones-container {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 20px;
            flex: 1; 
            overflow-y: auto; 
            padding-right: 10px;
        }

        /* Özel Kaydırma Çubuğu */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

        .category-drop-zone {
            background: rgba(255, 255, 255, 0.6);
            border: 2px dashed rgba(0, 0, 0, 0.1);
            border-radius: var(--radius-large);
            padding: 15px;
            min-height: 150px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: min-content;
            gap: 12px; 
            align-content: start;
            justify-items: center;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5);
        }

        .category-drop-zone:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: #a29bfe;
        }

        .category-drop-zone h3 {
            grid-column: 1 / -1; 
            margin: 0 0 15px 0;
            font-size: 2.5rem; 
            color: #2d3436;
            background: #ffffff;
            padding: 8px 20px;
            border-radius: var(--radius-pill);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 80%;
            text-align: center;
            font-weight: 400 !important;
        }

        .drop-zones-container .category-drop-zone:last-child:nth-child(odd) {
            grid-column: span 2;      
            justify-self: center;     
            width: calc(50% - 10px); 
        }
        
        /* Sağ Taraf: Kelime Bankası */
        .word-bank-container {
            flex: 0 0 28%; 
            height: 100%; 
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-large);
            padding: 15px; 
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            align-content: start; 
            gap: 12px; 
            overflow-y: auto; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        /* Sürüklenebilir Kelimeler */
        .word-item {
            padding: 8px 10px;
            color: white;
            font-size: 2rem; 
            font-weight: 400;
            border-radius: var(--radius-pill); 
            cursor: grab;
            user-select: none;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            
             width: 75%;
           margin: 0 auto;     /* Ortalamak için bunu ekleyin */
           height: auto;
            min-height: 42px;

           
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.1;
            position: relative;
            overflow: hidden;
        }

        /* Hafif parlama efekti */
        .word-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
            border-radius: var(--radius-pill);
        }
        
        .word-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }
        
        .word-item.mouse-dragging, .word-item.gliding {
            opacity: 0.9;
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .word-item.gliding { pointer-events: none; }
        
        /* Kontrol Sonrası */
        .word-item.correct {
            cursor: default;             
            box-shadow: 0 2px 5px rgba(0,0,0,0.1) !important; 
            transform: none !important;
            filter: none !important;     
        }
        
        .word-item.incorrect {
            background-color: var(--danger-color) !important;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Başlangıç Ekranı */
        #start-screen {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            text-align: center;
        }
        
        #start-screen h1 {
            font-size: 6rem;
            color: #2c3e50;
            margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(255,255,255,0.5);
            font-weight: 400 !important;
        }

        #start-button-main {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: #fff;
            font-family: var(--font-arabic);
            font-size: 3.5rem;
            padding: 15px 80px;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        #start-button-main:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.6);
        }

        /* Geri Bildirim Ekranı (Feedback) */
        .feedback-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(8px); 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: all 0.4s ease;
        }

          html {
    overflow-x: hidden;
    max-width: 100vw;
}
  
        .feedback-overlay.show { visibility: visible; opacity: 1; }

        .feedback-card {
            background: #ffffff;
            width: 350px;
            padding: 50px 30px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            text-align: center;
            transform: scale(0.7) translateY(50px); 
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 5px solid #fff;
        }

        .feedback-overlay.show .feedback-card {
            transform: scale(1) translateY(0); 
            opacity: 1;
        }

        #feedback-icon {
            font-size: 8rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            line-height: 1;
        }

        #feedback-text {
            font-size: 2.6rem;
            color: var(--text-dark);
            margin-bottom: 30px !important;
            font-weight: 400;
        }

        #replay-button {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 3rem !important;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 184, 148, 0.4);
            transition: all 0.3s ease;
        }

        #replay-button:hover {
            transform: rotate(-180deg) scale(1.1);
            box-shadow: 0 15px 30px rgba(0, 184, 148, 0.6);
        }

        /* Animasyonlar */
        .returning {
            z-index: 9999 !important; 
            pointer-events: none;      
            opacity: 1 !important;     
            will-change: transform;    
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .heart.lost {
            color: #bdc3c7 !important;
            filter: grayscale(100%);
            transform: scale(0.8);
        }

        /* Fullscreen Ayarları */
        body.fullscreen .activity-container {
            position: fixed !important; 
            top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            max-width: none !important; max-height: none !important;
            margin: 0 !important; border-radius: 0 !important; border: none !important;
            display: flex !important; flex-direction: column !important;
            z-index: 99999 !important;
        }
        body.fullscreen { background: var(--primary-bg) !important; }

        /* Yönlendirme Uyarısı (Telefonu Çevir) */
        #orientation-warning {
            position: fixed; inset: 0;
            background: #2d3436; color: white;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 99999; text-align: center;
        }

        .phone-animation {
            width: 60px; height: 100px;
            border: 4px solid white; border-radius: 10px; margin-bottom: 20px;
            animation: rotate-phone 2s infinite ease-in-out;
        }

        @keyframes rotate-phone { 0% { transform: rotate(0deg); } 40%, 100% { transform: rotate(90deg); } }
        #orientation-warning p { font-size: 2.5rem; margin: 0; }

        /* Mobil Cihazlar Dikey (Portrait) */
        @media screen and (orientation: portrait) and (max-width: 900px) {
            #orientation-warning { display: flex; }
            .activity-container, #start-screen { display: none !important; }
        }

        /* Mobil Cihazlar Yatay (Landscape) Uyumları */
        @media screen and (orientation: landscape) and (max-height: 600px) {
            html { font-size: 12px; }
            .activity-container { width: 100vw; height: 100vh; max-width: none; max-height: none; border-radius: 0; }
            .header { padding: 5px 15px; }
            .activity-area { padding: 10px; }
            .categorize-container { gap: 10px; }
            
            .category-drop-zone {
                min-height: 100px; padding: 10px; gap: 8px;
                grid-template-columns: repeat(3, 1fr) !important;
            }
            .category-drop-zone h3 { margin-bottom: 10px; padding: 4px 10px; font-size: 1.8rem; }
            
            .word-bank-container { flex: 0 0 25%; padding: 10px; gap: 8px; }
            .word-item { min-height: 35px; font-size: 1.6rem; padding: 4px; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-button-main" onclick="startGame()">اِبْدَأْ</button>
    </div>

    <div id="orientation-warning">
        <div class="phone-animation"></div>
        <p>يُرْجى تَدْوير الجِهاز</p>
    </div>

    <div class="activity-container" id="game-container">
        <div class="header">
            <div class="right-section">
                <div id="instruction-text">صَنِّف الكَلِمات</div>
                <div class="lives-container" id="lives-container">
                    <span class="heart" id="h1">❤</span>
                    <span class="heart" id="h2">❤</span>
                    <span class="heart" id="h3">❤</span>
                </div>
            </div>
            <div class="back-button-container">
                <a href="index.html" class="back-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </a>
                <button id="fullscreen-btn">
                    <svg class="icon-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5 10h2V7h3V5H5v5zM14 5v2h3v3h2V5h-5zM5 19v-5h2v3h3v2H5zM14 19v-2h3v-3h2v5h-5z"/></svg>
                    <svg class="icon-close" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                </button>
            </div>
        </div>

        <div class="activity-area" id="activity-area">
            <div id="categorize-area-content" style="flex-grow: 1; width: 100%; display: flex; flex-direction: column;"></div>
        </div>
    </div>

    <div class="feedback-overlay" id="feedback-overlay">
        <div class="feedback-card">
            <span id="feedback-icon"></span>
            <div id="feedback-text"></div>
            <button id="replay-button" onclick="restartGame()" title="Tekrar Dene">🔄</button>
        </div>
    </div>

<script>
    // --- OYUN MANTIĞI VE FONKSİYONLAR (DEĞİŞTİRİLMEDİ) ---
    const colorPalette = [
        '#ff7675', '#74b9ff', '#55efc4', '#fdcb6e', '#a29bfe', '#fab1a0', '#00cec9',
        '#e17055', '#0984e3', '#6c5ce7', '#00b894', '#e84393', '#d63031', '#feca57'
    ]; // Renkler yeni tasarıma uygun olarak pastel/canlı tonlarla güncellendi

const activityDataBank = [
    // 1. TUR: تصنيف المدن حسب الموقع الجغرافي
    {
        title: "صَنِّف المُدُن حَسَب مَوْقِعِها الجُغْرافِيّ.", 
        categories: ["➡️ شَرْق","⬆️ شَمال", "⬇️ جَنوب", " غَرْب ⬅️ ", "📍 وَسَط"], 
        words: [
            // شَمال (Kuzey)
            { w: "سينوب", cat: "⬆️ شَمال" }, 

            // جَنوب (Güney)
            { w: "مَرْسين", cat: "⬇️ جَنوب" }, 

            // شَرْق (Doğu)
            { w: "وان", cat: "➡️ شَرْق" }, 
            { w: "دِيارْ بَكِر", cat: "➡️ شَرْق" },
            { w: "باطْمان", cat: "➡️ شَرْق" },

            // غَرْب (Batı)
            { w: "إِزْمير", cat: " غَرْب ⬅️ " }, 
            { w: "إِسْطَنْبول", cat:" غَرْب ⬅️ " }, 
            { w: "بورْصَة", cat: " غَرْب ⬅️ " },

            // وَسَط (Orta)
            { w: "أَنْقَرَة", cat: "📍 وَسَط" }, 
            { w: "قونْيا", cat: "📍 وَسَط" },
            { w: "قَيْصَري", cat: "📍 وَسَط" }
        ]
    },

    // 2. TUR: الأَطْعِمَة وَالأَماكِن وَالصِّفات
    {
        title: "صَنِّف الكَلِمات حَسَب نَوْعِها.", 
        categories: ["🍲 أَطْعِمَة", "🏢 أَماكِن", "✨ صِفات"], 
        words: [
            // أَطْعِمَة (Meşhur Yemekler)
            { w: "المانْتي", cat: "🍲 أَطْعِمَة" }, 
            { w: "التَّنْتوني", cat: "🍲 أَطْعِمَة" }, 
            { w: "القِشْطَة", cat: "🍲 أَطْعِمَة" }, 
            { w: "كَباب", cat: "🍲 أَطْعِمَة" }, 

            // أَماكِن (Mekanlar)
            { w: "مُتْحَف", cat: "🏢 أَماكِن" }, 
            { w: "جامِع", cat: "🏢 أَماكِن" }, 
            { w: "قَلْعَة", cat: "🏢 أَماكِن" }, 
            { w: "سوق", cat: "🏢 أَماكِن" }, 
            { w: "حَيّ", cat: "🏢 أَماكِن" }, 

            // صِفات (Sıfatlar)
            { w: "مُزْدَحِم", cat: "✨ صِفات" }, 
            { w: "بَعيد", cat: "✨ صِفات" }, 
            { w: "قَريب", cat: "✨ صِفات" }, 
            { w: "تاريخِيَّة", cat: "✨ صِفات" },
            { w: "أَكْبَر", cat: "✨ صِفات" }
        ]
    }
];

    let currentActivityIndex = 0;
    let lives = 3;
    let audioCtx = null;
    let isGameWon = false;

    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'correct') {
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.linearRampToValueAtTime(880, now + 0.2);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        } else if (type === 'incorrect') {
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.linearRampToValueAtTime(150, now + 0.3);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        }
    }

    function updateHearts() {
        for (let i = 1; i <= 3; i++) {
            const heart = document.getElementById(`h${i}`);
            if (heart) {
                i > lives ? heart.classList.add('lost') : heart.classList.remove('lost');
            }
        }
    }

    function handleMistake(wordElement) {
        lives--;
        updateHearts();
        playSound('incorrect');

        wordElement.classList.add('incorrect-shake');

        setTimeout(() => {
            wordElement.classList.remove('incorrect-shake');
            
            if (lives <= 0) {
                showEndScreen(false);
                return;
            }

            const wordBank = document.getElementById('word-bank-container');
            const firstRect = wordElement.getBoundingClientRect();

            wordElement.classList.add('returning');
            wordBank.appendChild(wordElement); 

            const lastRect = wordElement.getBoundingClientRect();
            const deltaX = firstRect.left - lastRect.left;
            const deltaY = firstRect.top - lastRect.top;

            wordElement.style.transition = 'none';
            wordElement.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

            requestAnimationFrame(() => {
                wordElement.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                wordElement.style.transform = 'translate(0, 0)';
            });

            setTimeout(() => {
                wordElement.classList.remove('returning');
                wordElement.style.transition = '';
                wordElement.style.transform = '';
            }, 600);
        }, 500);
    }

    function loadActivity() {
        const area = document.getElementById('categorize-area-content');
        area.innerHTML = '';
        const data = activityDataBank[currentActivityIndex];
        document.getElementById('instruction-text').textContent = data.title;

        const container = document.createElement('div');
        container.className = 'categorize-container';

        const zonesWrap = document.createElement('div');
        zonesWrap.className = 'drop-zones-container';
        data.categories.forEach(cat => {
            const zone = document.createElement('div');
            zone.className = 'category-drop-zone';
            zone.dataset.category = cat;
            zone.innerHTML = `<h3>${cat}</h3>`;
            zonesWrap.appendChild(zone);
        });

        const bank = document.createElement('div');
        bank.className = 'word-bank-container';
        bank.id = 'word-bank-container';

        [...data.words].sort(() => Math.random() - 0.5).forEach((wData, i) => {
            const item = document.createElement('div');
            item.className = 'word-item';
            item.id = `word-${currentActivityIndex}-${i}`;
            item.textContent = wData.w;
            item.dataset.wordCat = wData.cat;
            item.draggable = true;
            item.style.backgroundColor = colorPalette[i % colorPalette.length];
            bank.appendChild(item);
        });

        container.appendChild(zonesWrap);
        container.appendChild(bank);
        area.appendChild(container);
        setupEvents();
    }

    function setupEvents() {
        const draggables = document.querySelectorAll('.word-item');
        const zones = document.querySelectorAll('.category-drop-zone, .word-bank-container');

        draggables.forEach(d => {
            // --- 1. MOUSE (MASAÜSTÜ) İÇİN STANDART D&D ---
            d.addEventListener('dragstart', e => {
                e.dataTransfer.setData('text/plain', d.id);
                d.classList.add('mouse-dragging');
            });
            d.addEventListener('dragend', () => d.classList.remove('mouse-dragging'));

            // --- 2. DOKUNMATİK EKRANLAR İÇİN KUSURSUZ NATIVE TOUCH EVENTS ---
            let startX, startY, initialRect, originalParent;

            d.addEventListener('touchstart', e => {
                if (d.classList.contains('correct') || d.classList.contains('incorrect-shake')) return;
                
                e.preventDefault(); 
                
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                
                initialRect = d.getBoundingClientRect();
                originalParent = d.parentNode;

                // ÇÖZÜM BURADA: Düzenin bozulmaması için orijinal elemanın "görünmez bir kopyasını" ekliyoruz.
                // Bu sayede CSS Grid sütunları yeniden hesaplamaz, kayma olmaz.
                const placeholder = d.cloneNode(true);
                placeholder.id = 'ghost-' + d.id;
                placeholder.style.visibility = 'hidden'; // Tamamen görünmez yap
                placeholder.style.pointerEvents = 'none'; // Dokunmayı kapat
                placeholder.style.transform = 'none'; 
                placeholder.style.transition = 'none';
                originalParent.insertBefore(placeholder, d);

                // Asıl elemanı serbest bırakıp body'e (ekranın tam üstüne) yapıştırıyoruz
                d.classList.add('mouse-dragging');
                d.style.position = 'fixed';
                d.style.left = initialRect.left + 'px';
                d.style.top = initialRect.top + 'px';
                d.style.width = initialRect.width + 'px'; // Genişliğinin bozulmasını engelle
                d.style.margin = '0';
                d.style.zIndex = '99999'; 
                d.style.transition = 'none';

                document.body.appendChild(d);
            }, { passive: false });

            d.addEventListener('touchmove', e => {
                if (!d.classList.contains('mouse-dragging')) return;
                e.preventDefault(); 
                
                const touch = e.touches[0];
                const moveX = touch.clientX - startX;
                const moveY = touch.clientY - startY;
                
                d.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }, { passive: false });

            d.addEventListener('touchend', e => {
                if (!d.classList.contains('mouse-dragging')) return;
                
                const touch = e.changedTouches[0];
                
                // Bırakılan yerdeki hedefi bul
                d.style.visibility = 'hidden';
                const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                d.style.visibility = 'visible';

                // Geçici stilleri güvenle temizle
                d.classList.remove('mouse-dragging');
                d.style.position = '';
                d.style.left = '';
                d.style.top = '';
                d.style.width = '';
                d.style.margin = '';
                d.style.zIndex = '';
                d.style.transition = ''; 
                d.style.transform = ''; 

                const placeholder = document.getElementById('ghost-' + d.id);
                let droppedInZone = false;

                // Hedef kontrolü
                if (elemBelow) {
                    const targetZone = elemBelow.closest('.category-drop-zone');
                    if (targetZone) {
                        targetZone.appendChild(d); 
                        if (placeholder) placeholder.remove(); 
                        droppedInZone = true;
                        
                        if (targetZone.dataset.category === d.dataset.wordCat) {
                            d.classList.add('correct');
                            d.draggable = false; 
                            playSound('correct');
                            checkWin();
                        } else {
                            handleMistake(d);
                        }
                    }
                }

                // Kutuya denk gelmediyse eski yerine (görünmez klonun olduğu yere) döndür
                if (!droppedInZone) {
                    if (placeholder) {
                        originalParent.insertBefore(d, placeholder);
                        placeholder.remove();
                    } else {
                        originalParent.appendChild(d);
                    }
                }
            });
        });

        // Masaüstü için standart Drop alanları ayarları
        zones.forEach(z => {
            z.addEventListener('dragover', e => e.preventDefault());
            z.addEventListener('drop', e => {
                e.preventDefault();
                const id = e.dataTransfer.getData('text/plain');
                const el = document.getElementById(id);
                if (!el) return;
                const targetZone = e.target.closest('.category-drop-zone');

                if (targetZone) {
                    targetZone.appendChild(el);

                    if (targetZone.dataset.category === el.dataset.wordCat) {
                        el.classList.add('correct');
                        el.draggable = false;
                        playSound('correct');
                        checkWin();
                    } else {
                        handleMistake(el);
                    }
                }
            });
        });
    }

    function checkWin() {
        const total = document.querySelectorAll('.word-item').length;
        const correct = document.querySelectorAll('.word-item.correct').length;
        if (total === correct && total > 0) {
            setTimeout(() => showEndScreen(true), 500);
        }
    }

   function showEndScreen(isWin) {
        isGameWon = isWin; 

        const overlay = document.getElementById('feedback-overlay');
        const icon = document.getElementById('feedback-icon');
        const text = document.getElementById('feedback-text');

        icon.textContent = isWin ? '🏆' : '😔';
        
        text.textContent = isWin 
            ? "أَحْسَنْت!" 
            : "لِلْأَسَف، اِنْتَهَت المُحاوَلات!"; 
        
        overlay.classList.add('show');
    }

    function restartGame() {
        if (isGameWon) {
            currentActivityIndex++;
            if (currentActivityIndex >= activityDataBank.length) {
                currentActivityIndex = 0; 
            }
        }

        lives = 3;
        updateHearts();
        document.getElementById('feedback-overlay').classList.remove('show');
        loadActivity();
    }

    function startGame() {
        initAudioContext();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        loadActivity();
        
        setTimeout(() => {
            new Audio('yonergebirak.wav').play().catch(() => {});
        }, 600);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const fsBtn = document.getElementById('fullscreen-btn');
        if (fsBtn) {
            fsBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            });
        }
    });
</script>
