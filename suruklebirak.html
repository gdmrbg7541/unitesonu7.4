<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نَشاط: الوَحْدَة الثّانِيَة</title>
    <link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
        font-family: 'Arakom';
        src: url('ARAKOM.TTF') format('truetype'),
             url('arakom.ttf') format('truetype'),
             url('Arakom.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

        /* --- Temel Sayfa Stilleri --- */
        :root {
            --accent-color: #007bff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-light: #f8f9fa;
            
            /* GÜNCELLEME: Font 'Arakom' olarak değiştirildi */
            --font-arabic: 'Arakom', 'Markazi Text', 'Tahoma', 'Arial', sans-serif;
        }
        body {
            font-family: var(--font-arabic);
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-weight: 400;
        }

        /* --- Ana Etkinlik Alanı (16:9) --- */
        .activity-container {
            position: relative;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: none; /* Başlangıçta gizli */
            flex-direction: column;
            
            /* DEĞİŞİKLİK BURADA: %90 yerine %99 yapıldı */
            width: 99vw;
            height: calc(99vw * 9 / 16); 
            max-height: 99vh;
            max-width: calc(99vh * 16 / 9);
        }
        
      
        .back-button {
            background: #f0f0f0;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 1.5vmin;
            cursor: pointer;
            width: clamp(40px, 8vmin, 55px);
            height: clamp(40px, 8vmin, 55px);
            padding: 0;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0; 
        }
        .back-button:hover {
            background: #e0e0e0;
        }
        .back-button svg {
            width: clamp(24px, 5vmin, 30px);
            height: clamp(24px, 5vmin, 30px);
            fill: currentColor;
        }

/* Header ana taşıyıcı */
.header {
    padding: 10px 25px;
    border-bottom: 1px solid #dee2e6;
    display: flex;
    flex-direction: row; /* Varsayılan row kalsın, biz elemanları içeride hizalayacağız */
    align-items: center;
    justify-content: space-between; /* Sağ ve sol blokları uçlara iter */
    direction: rtl; /* Sağdan sola akış */
}

/* Sağ Bölüm: Yönerge ve Kalpler */
.right-section {
    display: flex;
    align-items: center; /* Dikeyde tam ortalar */
    gap: 20px;
    direction: rtl;
    flex-grow: 1; /* Metin alanının genişlemesini sağlar */
}

#instruction-text {
    font-size: 2.2rem;
    color: #555;
    margin: 0;
    line-height: 1.2; /* Fonttan kaynaklı kaymayı önler */
    display: flex;
    align-items: center;
}

.lives-container {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    
    /* 1. YÖNTEM: Manuel İnce Ayar */
    /* Kalpler yukarıda duruyorsa pozitif (2px), aşağıda duruyorsa negatif (-2px) yap */
    transform: translateY(2px); 
    
    /* 2. YÖNTEM: Alternatif olarak padding kullan */
    /* padding-top: 4px; */
}

.heart {
    font-size: 2.5rem;
    color: #ff4d4d;
    line-height: 1; /* Satır yüksekliğini sıfırlayarak taşmayı önler */
    display: inline-flex;
    align-items: center;
    justify-content: center;
}


/* Sol blok: Butonlar */
.back-button-container {
    display: flex;
    gap: 10px;
    direction: ltr; /* Butonların kendi içindeki (ikon+ok) yönü düz kalsın istenirse */
}     
        
        
        /* --- Asıl Etkinlik Alanı --- */
        .activity-area {
            flex-grow: 1;
            padding: 15px;
            display: flex;
            flex-direction: column; /* İçeriği ve butonu dikey hizalamak için */
            justify-content: space-between; /* İçerik ve buton arasına boşluk koymak için */
            align-items: center;     
            overflow: hidden; 
        }

        /* --- Sınıflandırma Konteyneri --- */
        .categorize-container {
            display: flex;
            flex-direction: row-reverse; /* Sağda kelimeler, solda kutular */
            width: 100%;  
            flex-grow: 1; /* Tüm alanı kapla */
            gap: 15px;
        }


        /* --- Sol Taraf (Hedef Kutular - GENİŞLETİLDİ) --- */
        .drop-zones-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Sütun */
            gap: 15px;
            flex: 1; 
            overflow-y: auto; 
            padding: 5px;
        }

        .category-drop-zone {
            background-color: var(--bg-light);
            border: 2px solid var(--accent-color);
            border-radius: 10px;
            padding: 10px;
            min-height: 150px;
            
            display: grid;
            grid-template-columns: 1fr 1fr; 
            grid-auto-rows: min-content;
            
            gap: 8px; 
            
            align-content: start;
            justify-items: center;
            transition: border-color 0.3s; /* Dragover için ekledik */
        }

       .category-drop-zone h3 {
    grid-column: 1 / -1; 
    margin: 0 0 10px 0;
    font-size: 2.1rem; 
    color: var(--accent-color);
    border-bottom: 2px solid #ddd;
    padding-bottom: 5px;
    width: 100%;
    text-align: center;
    font-weight: 400 !important; /* Bu satırı ekleyin */
}
        /* --- Tek kalan son kutuyu ortalama kodu --- */
        .drop-zones-container .category-drop-zone:last-child:nth-child(odd) {
            grid-column: span 2;      
            justify-self: center;     
            width: calc(50% - 7.5px); 
        }
        
        /* --- Sağ Taraf (Kelime Bankası - DARALTILDI & 3 SÜTUN) --- */
        .word-bank-container {
            flex: 0 0 30%; 
            height: 100%; 
            background: #fff;
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 10px; 
            
            /* CSS GRID: 2 SÜTUN */
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            align-content: start; 
            gap: 8px; 
            
            overflow-y: auto; 
            box-sizing: border-box;
        }

        .word-item {
            padding: 5px 2px;
            color: white;
            font-size: 1.8rem; 
            font-weight: 400;
            border-radius: 8px; 
            cursor: grab;
            user-select: none;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            
            width: 100%; 
            height: auto;
            min-height: 50px; 
            
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.1;
        }
        
        .word-item:hover {
            filter: brightness(85%);
        }
        
        .word-item.mouse-dragging {
            opacity: 0.5;
            box-shadow: none;
        }
        
        /* --- KONTROL SONRASI STİLLER --- */
        .word-item.correct {
            cursor: default;             /* Sadece fare imlecini değiştir */
            box-shadow: none !important; /* Çerçeve veya gölge ekleme */
            filter: none !important;     /* Parlaklık değişikliği yapma */
            
            /* NOT: background-color satırını sildiğimiz için 
               kelime kendi orijinal renginde kalmaya devam eder. */
        }
        
        .word-item.incorrect {
            background-color: var(--danger-color) !important;
            animation: shake 0.5s;
        }


       /* Ana Kaplama (Arka Plan Karartma) */
.feedback-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.4); /* Hafif karartma derinlik katar */
    backdrop-filter: blur(8px); /* Modern cam efekti */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    visibility: hidden;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.feedback-overlay.show {
    visibility: visible;
    opacity: 1;
}

/* Modern Panel (Kart) */
.feedback-card {
    background: #ffffff;
    width: 320px;
    padding: 40px 20px;
    border-radius: 30px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    text-align: center;
    transform: scale(0.7); /* Açılış animasyonu için başlangıç */
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    align-items: center;
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.feedback-overlay.show .feedback-card {
    transform: scale(1); /* Kart büyüyerek gelir */
}

/* İkon Alanı */
#feedback-icon {
    display: block;
    margin-bottom: 15px;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
    line-height: 1;
}

/* Metin Alanı */
#feedback-text {
    font-family: 'Arakom', sans-serif;
    color: #333;
    line-height: 1.4;
    margin-bottom: 25px !important;
}

/* Yeniden Başlat Butonu (Sarı & Yuvarlak) */
#replay-button {
    background: #FFD700; /* Altın Sarısı */
    background: linear-gradient(145deg, #ffeb3b, #fbc02d);
    color: #333;
    border: none;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    font-size: 2.5rem !important;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 20px rgba(251, 192, 45, 0.4);
    transition: all 0.3s ease;
    padding: 0;
}

#replay-button:hover {
    transform: rotate(-45deg) scale(1.1);
    box-shadow: 0 15px 25px rgba(251, 192, 45, 0.6);
}

#replay-button:active {
    transform: scale(0.95);
}
        /* --- Tam Ekran Butonu --- */
        #fullscreen-btn {
            background: #f0f0f0;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 1.5vmin;
            cursor: pointer;
            width: clamp(40px, 8vmin, 55px);
            height: clamp(40px, 8vmin, 55px);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px; 
            margin-left: 10px; 
            flex-shrink: 0; 
        }
        #fullscreen-btn:hover {
            background: #e0e0e0;
        }
        #fullscreen-btn svg {
            width: clamp(24px, 5vmin, 30px);
            height: clamp(24px, 5vmin, 30px);
            fill: currentColor;
        }
        #fullscreen-btn .icon-open { display: block; }
        #fullscreen-btn .icon-close { display: none; }
        body.fullscreen #fullscreen-btn .icon-open { display: none; }
        body.fullscreen #fullscreen-btn .icon-close { display: block; }

        body.fullscreen .activity-container {
            position: fixed !important; /* Sayfa akışından çıkar, ekrana çivile */
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            
            /* Sınırlamaları kaldır */
            max-width: none !important;
            max-height: none !important;
            margin: 0 !important;
            padding: 0 !important;
            border-radius: 0 !important;
            border: none !important;
            box-shadow: none !important;
            
            /* İçeriği düzelt */
            display: flex !important;
            flex-direction: column !important;
            z-index: 99999 !important; /* En üste çıkar */
        }

        /* Tam ekranda arka plan rengini beyaza eşitle ki boşluk hissi oluşmasın */
        body.fullscreen {
            background-color: #ffffff !important; 
            overflow: hidden !important; /* Kaydırma çubuklarını yok et */
            padding: 0 !important;
            margin: 0 !important;
            display: block !important; /* Flex ortalamasını iptal et */
        }

        /* --- Mobil Dikey Düzen (Portrait) --- */
        @media (orientation: portrait) {
            .activity-container {
                /* DEĞİŞİKLİK BURADA: %95 yerine %99 yapıldı */
                width: 99vw;
                height: calc(99vw * 16 / 9); 
                max-height: 99vh;
                max-width: calc(99vh * 9 / 16); 
            }
            #start-screen h1 {
    font-size: 5rem;
    margin-bottom: 10px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.2);
    font-weight: 400 !important; /* Bold (700) yerine 400 yapıldı */
}

            #start-screen p {
                font-size: 1.5rem !important; 
            }

            #start-button-main {
                font-size: 2rem;    
                padding: 8px 40px;  
                margin-top: 20px;
                width: 60%;         
                max-width: 300px;
            }
            body.fullscreen .activity-container {
                width: 100vw;

            }
            
           
            
          
            .categorize-container {
                flex-direction: column;
            }
            .drop-zones-container {
                width: 100%;

            }
            .word-bank-container {
                 width: 100%;

            }
           .word-item {

                min-height: 40px;  
                width: 100%;
            }
             #check-button {
                font-size: 1.8rem !important;

            }
        }

        /* ================================================================= */
        /* --- GÜNCELLENMİŞ: MOBİL YATAY (LANDSCAPE) AYARLARI --- */
        /* ================================================================= */
        @media screen and (orientation: landscape) and (max-height: 500px) {
            
            html {
                font-size: 10px !important; 
            }

            .activity-container {
                width: 100vw !important;
                height: 100vh !important;

                border-radius: 0;

            }

          
           
            .activity-area {

            .drop-zones-container {
                gap: 10px 10px;

            }

            .category-drop-zone {
        /* İŞTE BOYUTU BELİRLEYEN KISIM BURASI */
        height: 120px !important;

        overflow-y: auto;

    }

           .category-drop-zone h3 {
    font-size: 2rem; 
    margin-bottom: 0;   /* Başlığın dışındaki alt boşluğu sıfırladık */
    padding-bottom: 0; /* ÇİZGİ İLE YAZI ARASINDAKİ BOŞLUK BURASIDIR */
    border-bottom: 1px solid #ddd; /* Alt çizgi */

}
            /* --- Sağ Taraf (Kelime Bankası) --- */
            .word-bank-container {
                flex: 0 0 25%;

            }

            }

            }

            }

        /* ========================================= */
        /* --- START SCREEN (Sadece Arapça) --- */
        /* ========================================= */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #007bff 0%, #0d6efd 100%);

            align-items: center;

        }
        
        #start-screen h1 {

        }

        #start-button-main {
            background: #ffc107;

            transition: transform 0.2s, box-shadow 0.2s;

        }

        #start-button-main:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            background: #ffca2c;
        }

        /* ========================================= */
        /* --- ORIENTATION WARNING (Sadece Arapça) --- */
        /* ========================================= */
        #orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #212529;
            color: white;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; 
            text-align: center;
        }

        .phone-animation {
            width: 60px;
            height: 100px;
            border: 4px solid white;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: rotate-phone 2s infinite ease-in-out;
        }

        @keyframes rotate-phone {
            0% { transform: rotate(0deg); }
            40% { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }

        #orientation-warning p {
            font-size: 2rem;
            font-family: var(--font-arabic);
            margin: 0;
        }

        @media screen and (orientation: portrait) and (max-width: 900px) {
            #orientation-warning {
                display: flex;
            }
            .activity-container, #start-screen {
                display: none !important;
            }
        }

/* --- Sürüklenme Animasyonu İçin --- */
.word-item.gliding {

}
/* İçeriğin tam ekranda dikey olarak yayılmasını sağlar */

            display: flex;
            flex-direction: column;
            justify-content: space-between;

            padding: 10px;
        }




.returning {
    z-index: 9999 !important; /* Her şeyin üstünde uçsun */
    pointer-events: none;      /* Uçarken etkileşimi kes */
    opacity: 1 !important;     /* Kaybolmayı engelle */
    will-change: transform;    /* Tarayıcıya önceden bildir */
}

/* Yanlış sallanma animasyonu (daha pürüzsüz hali) */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
}

/* Kalplerin siyahlaşma efekti */
.heart.lost {
    color: #333 !important;
    opacity: 0.3;
    transform: scale(0.8);
}

/* Yanlış sallanma efekti */
.incorrect-shake {
    animation: shake 0.5s ease;
    background-color: #dc3545 !important;
}

            🔄
        </button>
    </div>
</div>

<script>
    // --- 1. الإعدادات والبيانات ---
    const colorPalette = [
        '#007bff', '#dc3545', '#28a745', '#ffc107', '#17a2b8', '#6f42c1', '#fd7e14',
        '#20c997', '#6610f2', '#e83e8c', '#d63384', '#198754', '#0d6efd', '#adb5bd',
        '#ff6b6b', '#fca311', '#90be6d', '#43aa8b', '#577590', '#f94144'
    ];

const activityDataBank = [
    // 1. TUR: تصنيف المدن حسب الموقع الجغرافي
    {
        title: "صَنِّف المُدُن حَسَب مَوْقِعِها الجُغْرافِيّ.", 
        categories: ["شَمال", "جَنوب", "شَرْق", "غَرْب", "وَسَط"], 
        words: [
            // شَمال (Kuzey)
            { w: "سينوب", cat: "شَمال" }, 

            // جَنوب (Güney)
            { w: "مَرْسين", cat: "جَنوب" }, 

            // شَرْق (Doğu)
            { w: "وان", cat: "شَرْق" }, 
            { w: "دِيارْ بَكِر", cat: "شَرْق" },
            { w: "باطْمان", cat: "شَرْق" },

            // غَرْب (Batı)
            { w: "إِزْمير", cat: "غَرْب" }, 
            { w: "إِسْطَنْبول", cat: "غَرْب" }, 
            { w: "بورْصَة", cat: "غَرْب" },

            // وَسَط (Orta)
            { w: "أَنْقَرَة", cat: "وَسَط" }, 
            { w: "قونْيا", cat: "وَسَط" },
            { w: "قَيْصَري", cat: "وَسَط" }
        ]
    },

    // 2. TUR: الأَطْعِمَة وَالأَماكِن وَالصِّفات
    {
        title: "صَنِّف الكَلِمات حَسَب نَوْعِها.", 
        categories: ["أَطْعِمَة", "أَماكِن", "صِفات"], 
        words: [
            // أَطْعِمَة (Meşhur Yemekler)
            { w: "المانْتي", cat: "أَطْعِمَة" }, 
            { w: "التَّنْتوني", cat: "أَطْعِمَة" }, 
            { w: "القِشْطَة", cat: "أَطْعِمَة" }, 
            { w: "كَباب إِسْكَنْدَر", cat: "أَطْعِمَة" }, 
            { w: "كَباب جاغ", cat: "أَطْعِمَة" }, 

            // أَماكِن (Mekanlar)
            { w: "مُتْحَف", cat: "أَماكِن" }, 
            { w: "جامِع", cat: "أَماكِن" }, 
            { w: "قَلْعَة", cat: "أَماكِن" }, 
            { w: "سوق", cat: "أَماكِن" }, 
            { w: "حَيّ", cat: "أَماكِن" }, 

            // صِفات (Sıfatlar)
            { w: "مُزْدَحِم", cat: "صِفات" }, 
            { w: "بَعيد", cat: "صِفات" }, 
            { w: "قَريب", cat: "صِفات" }, 
            { w: "تاريخِيَّة", cat: "صِفات" },
            { w: "أَكْبَر", cat: "صِفات" }
        ]
    }
];
    let currentActivityIndex = 0;
    let lives = 3;
    let audioCtx = null;

    // --- 2. إدارة الصوت ---
    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'correct') {
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.linearRampToValueAtTime(880, now + 0.2);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        } else if (type === 'incorrect') {
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.linearRampToValueAtTime(150, now + 0.3);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        }
    }

    // --- 3. نظام الحياة (Can Sistemi) ---
    function updateHearts() {
        for (let i = 1; i <= 3; i++) {
            const heart = document.getElementById(`h${i}`);
            if (heart) {
                i > lives ? heart.classList.add('lost') : heart.classList.remove('lost');
            }
        }
    }

    // --- 4. معالجة الخطأ والرسوم المتحركة (FLIP) ---
    function handleMistake(wordElement) {
        lives--;
        updateHearts();
        playSound('incorrect');

        // تأثير الاهتزاز
        wordElement.classList.add('incorrect-shake');

        setTimeout(() => {
            wordElement.classList.remove('incorrect-shake');
            
            if (lives <= 0) {
                showEndScreen(false);
                return;
            }

            // نظام الطيران العكسي (FLIP)
            const wordBank = document.getElementById('word-bank-container');
            const firstRect = wordElement.getBoundingClientRect();

            wordElement.classList.add('returning');
            wordBank.appendChild(wordElement); // نقله في الـ DOM

            const lastRect = wordElement.getBoundingClientRect();
            const deltaX = firstRect.left - lastRect.left;
            const deltaY = firstRect.top - lastRect.top;

            wordElement.style.transition = 'none';
            wordElement.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

            requestAnimationFrame(() => {
                wordElement.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                wordElement.style.transform = 'translate(0, 0)';
            });

            setTimeout(() => {
                wordElement.classList.remove('returning');
                wordElement.style.transition = '';
                wordElement.style.transform = '';
            }, 600);
        }, 500);
    }

    // --- 5. بناء اللعبة ومنطق السحب ---
    function loadActivity() {
        const area = document.getElementById('categorize-area-content');
        area.innerHTML = '';
        const data = activityDataBank[currentActivityIndex];
        document.getElementById('instruction-text').textContent = data.title;

        const container = document.createElement('div');
        container.className = 'categorize-container';

        const zonesWrap = document.createElement('div');
        zonesWrap.className = 'drop-zones-container';
        data.categories.forEach(cat => {
            const zone = document.createElement('div');
            zone.className = 'category-drop-zone';
            zone.dataset.category = cat;
            zone.innerHTML = `<h3>${cat}</h3>`;
            zonesWrap.appendChild(zone);
        });

        const bank = document.createElement('div');
        bank.className = 'word-bank-container';
        bank.id = 'word-bank-container';

        [...data.words].sort(() => Math.random() - 0.5).forEach((wData, i) => {
            const item = document.createElement('div');
            item.className = 'word-item';
            item.id = `word-${currentActivityIndex}-${i}`;
            item.textContent = wData.w;
            item.dataset.wordCat = wData.cat;
            item.draggable = true;
            item.style.backgroundColor = colorPalette[i % colorPalette.length];
            bank.appendChild(item);
        });

        container.appendChild(zonesWrap);
        container.appendChild(bank);
        area.appendChild(container);
        setupEvents();
    }

    function setupEvents() {
        const draggables = document.querySelectorAll('.word-item');
        const zones = document.querySelectorAll('.category-drop-zone, .word-bank-container');

        draggables.forEach(d => {
            d.addEventListener('dragstart', e => {
                e.dataTransfer.setData('text/plain', d.id);
                d.classList.add('mouse-dragging');
            });
            d.addEventListener('dragend', () => d.classList.remove('mouse-dragging'));
        });

        zones.forEach(z => {
            z.addEventListener('dragover', e => e.preventDefault());
            z.addEventListener('drop', e => {
    e.preventDefault();
    const id = e.dataTransfer.getData('text/plain');
    const el = document.getElementById(id);
    const targetZone = e.target.closest('.category-drop-zone');

    if (targetZone) {
        // Önce kelimeyi kutuya fiziksel olarak ekle (Animasyonun görünmesi için)
        targetZone.appendChild(el);

        if (targetZone.dataset.category === el.dataset.wordCat) {
            // DOĞRUYSA
            el.classList.add('correct');
            el.draggable = false;
            playSound('correct');
            checkWin();
        } else {
            // YANLIŞSA: handleMistake artık kutunun içindeyken tetiklenecek
            handleMistake(el);
        }
    }
});
        });
    }

    function checkWin() {
        const total = document.querySelectorAll('.word-item').length;
        const correct = document.querySelectorAll('.word-item.correct').length;
        if (total === correct && total > 0) {
            setTimeout(() => showEndScreen(true), 500);
        }
    }

    function showEndScreen(isWin) {
    const overlay = document.getElementById('feedback-overlay');
    const icon = document.getElementById('feedback-icon');
    const text = document.getElementById('feedback-text');

    icon.textContent = isWin ? '✔' : '❌';
    icon.className = isWin ? 'correct' : 'incorrect';
    
    // Türkçe "Haklar Bitti" ifadesi kaldırıldı
    text.textContent = isWin 
        ? "أَحْسَنْت! تَمَّت العَمَلِيَّة بِنَجاح" 
        : "لِلْأَسَف، اِنْتَهَت المُحاوَلات!"; 
    
    overlay.classList.add('show');
}

    function restartGame() {
        lives = 3;
        updateHearts();
        document.getElementById('feedback-overlay').classList.remove('show');
        loadActivity();
    }

    function startGame() {
        initAudioContext();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        loadActivity();
        
        setTimeout(() => {
            new Audio('yonergebirak.wav').play().catch(() => {});
        }, 600);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const fsBtn = document.getElementById('fullscreen-btn');
        if (fsBtn) {
            fsBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            });
        }
    });
</script>

</body>
</html>
