    <style>
        @font-face {
        font-family: 'Arakom';
        src: url('ARAKOM.TTF') format('truetype'),
             url('arakom.ttf') format('truetype'),
             url('Arakom.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

        /* --- Temel Sayfa Stilleri --- */
        :root {
            --accent-color: #007bff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-light: #f8f9fa;
            
            /* GÜNCELLEME: Font 'Arakom' olarak değiştirildi */
            --font-arabic: 'Arakom', 'Markazi Text', 'Tahoma', 'Arial', sans-serif;
        }
        body {
            font-family: var(--font-arabic);
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-weight: 400;
        }

        /* --- Ana Etkinlik Alanı (16:9) --- */
        .activity-container {
            position: relative;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: none; /* Başlangıçta gizli */
            flex-direction: column;
            
            /* DEĞİŞİKLİK BURADA: %90 yerine %99 yapıldı */
            width: 99vw;
            height: calc(99vw * 9 / 16); 
            max-height: 99vh;
            max-width: calc(99vh * 16 / 9);
        }
        
        /* --- Geri Tuşu --- */
        .back-button-container {
            grid-area: back;
            display: flex;
            justify-content: flex-end; 
            align-items: center; 
        }
        .back-button {
            background: #f0f0f0;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 1.5vmin;
            cursor: pointer;
            width: clamp(40px, 8vmin, 55px);
            height: clamp(40px, 8vmin, 55px);
            padding: 0;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0; 
        }
        .back-button:hover {
            background: #e0e0e0;
        }
        .back-button svg {
            width: clamp(24px, 5vmin, 30px);
            height: clamp(24px, 5vmin, 30px);
            fill: currentColor;
        }

        /* --- Başlık --- */
        .header {
            padding: 15px 25px;
            border-bottom: 1px solid #dee2e6;
            display: grid;
            grid-template-areas: "instruction back"; 
            grid-template-columns: 1fr auto; 
            align-items: center;
            gap: 20px;
            flex-shrink: 0; 
        }
        
        #instruction-text {
            grid-area: instruction;
            text-align: right; 
            font-size: 2.2rem; 
            font-weight: 700;
            color: #555;
        }
        
        /* --- Asıl Etkinlik Alanı --- */
        .activity-area {
            flex-grow: 1;
            padding: 15px;
            display: flex;
            flex-direction: column; /* İçeriği ve butonu dikey hizalamak için */
            justify-content: space-between; /* İçerik ve buton arasına boşluk koymak için */
            align-items: center;     
            overflow: hidden; 
        }

        /* --- Sınıflandırma Konteyneri --- */
        .categorize-container {
            display: flex;
            flex-direction: row-reverse; /* Sağda kelimeler, solda kutular */
            width: 100%;  
            flex-grow: 1; /* Tüm alanı kapla */
            gap: 15px;
        }


        /* --- Sol Taraf (Hedef Kutular - GENİŞLETİLDİ) --- */
        .drop-zones-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Sütun */
            gap: 15px;
            flex: 1; 
            overflow-y: auto; 
            padding: 5px;
        }

        .category-drop-zone {
            background-color: var(--bg-light);
            border: 2px solid var(--accent-color);
            border-radius: 10px;
            padding: 10px;
            min-height: 150px;
            
            display: grid;
            grid-template-columns: 1fr 1fr; 
            grid-auto-rows: min-content;
            
            gap: 8px; 
            
            align-content: start;
            justify-items: center;
            transition: border-color 0.3s; /* Dragover için ekledik */
        }

        .category-drop-zone h3 {
            grid-column: 1 / -1; 
            margin: 0 0 10px 0;
            font-size: 2.1rem; 
            color: var(--accent-color);
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
            width: 100%;
            text-align: center;
        }
        /* --- Tek kalan son kutuyu ortalama kodu --- */
        .drop-zones-container .category-drop-zone:last-child:nth-child(odd) {
            grid-column: span 2;      
            justify-self: center;     
            width: calc(50% - 7.5px); 
        }
        
        /* --- Sağ Taraf (Kelime Bankası - DARALTILDI & 3 SÜTUN) --- */
        .word-bank-container {
            flex: 0 0 30%; 
            height: 100%; 
            background: #fff;
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 10px; 
            
            /* CSS GRID: 2 SÜTUN */
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            align-content: start; 
            gap: 8px; 
            
            overflow-y: auto; 
            box-sizing: border-box;
        }

        .word-item {
            padding: 5px 2px;
            color: white;
            font-size: 1.8rem; 
            font-weight: 700;
            border-radius: 8px; 
            cursor: grab;
            user-select: none;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            
            width: 100%; 
            height: auto;
            min-height: 50px; 
            
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.1;
        }
        
        .word-item:hover {
            filter: brightness(85%);
        }
        
        .word-item.mouse-dragging {
            opacity: 0.5;
            box-shadow: none;
        }
        
        /* --- KONTROL SONRASI STİLLER --- */
        .word-item.correct {
            cursor: default;             /* Sadece fare imlecini değiştir */
            box-shadow: none !important; /* Çerçeve veya gölge ekleme */
            filter: none !important;     /* Parlaklık değişikliği yapma */
            
            /* NOT: background-color satırını sildiğimiz için 
               kelime kendi orijinal renginde kalmaya devam eder. */
        }
        
        .word-item.incorrect {
            background-color: var(--danger-color) !important;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* --- Geri Bildirim --- */
        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15rem;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
            flex-direction: column; 
        }
        .feedback-overlay.show {
            visibility: visible;
            opacity: 1;
        }
        .feedback-overlay .correct { color: var(--success-color); }
        .feedback-overlay .incorrect { color: var(--danger-color); }
        
        #replay-button {
            display: none; 
            font-size: 4.5rem; 
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: transform 0.2s ease, background-color 0.2s ease;
            margin-top: 20px; 
        }
        #replay-button:hover {
            transform: rotate(-90deg);
            background-color: #f0f0f0;
        }
        .feedback-overlay.show.game-finished #replay-button {
            display: block;
        }
        
        /* --- Tam Ekran Butonu --- */
        #fullscreen-btn {
            background: #f0f0f0;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 1.5vmin;
            cursor: pointer;
            width: clamp(40px, 8vmin, 55px);
            height: clamp(40px, 8vmin, 55px);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px; 
            margin-left: 10px; 
            flex-shrink: 0; 
        }
        #fullscreen-btn:hover {
            background: #e0e0e0;
        }
        #fullscreen-btn svg {
            width: clamp(24px, 5vmin, 30px);
            height: clamp(24px, 5vmin, 30px);
            fill: currentColor;
        }
        #fullscreen-btn .icon-open { display: block; }
        #fullscreen-btn .icon-close { display: none; }
        body.fullscreen #fullscreen-btn .icon-open { display: none; }
        body.fullscreen #fullscreen-btn .icon-close { display: block; }

        body.fullscreen .activity-container {
            position: fixed !important; /* Sayfa akışından çıkar, ekrana çivile */
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            
            /* Sınırlamaları kaldır */
            max-width: none !important;
            max-height: none !important;
            margin: 0 !important;
            padding: 0 !important;
            border-radius: 0 !important;
            border: none !important;
            box-shadow: none !important;
            
            /* İçeriği düzelt */
            display: flex !important;
            flex-direction: column !important;
            z-index: 99999 !important; /* En üste çıkar */
        }

        /* Tam ekranda arka plan rengini beyaza eşitle ki boşluk hissi oluşmasın */
        body.fullscreen {
            background-color: #ffffff !important; 
            overflow: hidden !important; /* Kaydırma çubuklarını yok et */
            padding: 0 !important;

            display: block !important; /* Flex ortalamasını iptal et */

            // صِفات (Sıfatlar)
            { w: "مُزْدَحِم", cat: "صِفات" }, 
            { w: "بَعيد", cat: "صِفات" }, 
            { w: "قَريب", cat: "صِفات" }, 
            { w: "تاريخِيَّة", cat: "صِفات" },
            { w: "أَكْبَر", cat: "صِفات" }
        ]
    }
];

        // --- Gerekli Elementler ---
        const instructionText = document.getElementById('instruction-text');
        const feedbackOverlay = document.getElementById('feedback-overlay');
        const feedbackIcon = document.getElementById('feedback-icon');
        const startScreen = document.getElementById('start-screen');
        const gameContainer = document.getElementById('game-container');
        
        let audioCtx = null;
        let currentActivityIndex = 0; 

        // --- SES FONKSİYONLARI ---
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        
        function playSound(type) {
            if (!audioCtx) return; 
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            const now = audioCtx.currentTime;

            if (type === 'touch') {
                oscillator.frequency.setValueAtTime(200, now);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
                oscillator.start(now); oscillator.stop(now + 0.1);
            } else if (type === 'correct') {
                oscillator.frequency.setValueAtTime(440, now);
                oscillator.frequency.linearRampToValueAtTime(880, now + 0.2);
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
                oscillator.start(now); oscillator.stop(now + 0.2);
            } else if (type === 'incorrect') {
                oscillator.frequency.setValueAtTime(300, now);
                oscillator.frequency.linearRampToValueAtTime(150, now + 0.3);
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
                oscillator.start(now); oscillator.stop(now + 0.3);
            }
        }

        
        // --- OYUN BAŞLATMA ---
        function startGame() {
            initAudioContext();
            startScreen.style.display = 'none';
            gameContainer.style.display = 'flex';
            loadActivity();
            
            // Kontrol butonunu gizle (Otomatik kontrol yapacağız)
            document.getElementById('check-button').style.display = 'none'; 
            triggerFullscreen();

            // --- YENİ EKLENEN KISIM: 0.6 Saniye Gecikmeli Ses ---
            setTimeout(() => {
                const audio = new Audio('yonergebirak.wav');
                audio.play().catch(error => {
                    console.warn("Ses otomatik oynatılamadı (Tarayıcı engeli olabilir):", error);
                });
            }, 600); // 600 milisaniye = 0.6 saniye
        }

        function triggerFullscreen() {
            const docEl = document.documentElement;
            if(docEl.requestFullscreen) docEl.requestFullscreen().catch(err => {});
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadActivity() {
            const categorizeAreaContent = document.getElementById('categorize-area-content');
            categorizeAreaContent.innerHTML = '';
            
            const data = activityDataBank[currentActivityIndex];
            instructionText.textContent = data.title; 
            feedbackOverlay.classList.remove('show', 'game-finished');

            buildCategorize(data); 
        }
        
        function buildCategorize(data) {
            const container = document.createElement('div');
            container.className = 'categorize-container';

            const dropZonesContainer = document.createElement('div');
            dropZonesContainer.className = 'drop-zones-container';
            
            data.categories.forEach((categoryName) => {
                const dropZone = document.createElement('div');
                dropZone.className = 'category-drop-zone';
                dropZone.dataset.category = categoryName; 
                const title = document.createElement('h3');
                title.textContent = categoryName;
                dropZone.appendChild(title);
                dropZonesContainer.appendChild(dropZone);
            });
            
            const wordBank = document.createElement('div');
            wordBank.className = 'word-bank-container';
            wordBank.id = 'word-bank-container'; 
            
            const shuffledWords = shuffle([...data.words]);
            shuffledWords.forEach((wordData, index) => {
                const wordItem = document.createElement('div');
                wordItem.className = 'word-item';
                wordItem.id = `word-${index}`;
                wordItem.textContent = wordData.w;
                wordItem.dataset.wordCat = wordData.cat; 
                wordItem.draggable = true;
                wordItem.style.backgroundColor = colorPalette[index % colorPalette.length];
                wordBank.appendChild(wordItem);
            });
            
            container.appendChild(dropZonesContainer);
            container.appendChild(wordBank);
            document.getElementById('categorize-area-content').appendChild(container);
            
            addDragDropListeners();
        }

       
        // --- GELİŞMİŞ METİN DÖNÜŞTÜRME (GÜNCELLENDİ: Fethalı Elif) ---
        function transformWordText(wordElement, category) {
            let text = wordElement.textContent;
            
            // Eğer zaten "ال" ile başlıyorsa işlem yapma
            if (text.startsWith("ال") || text.startsWith("اَل")) return;

            // 1. ADIM: Sondaki Tenvin'i (Dammatan - u064C) tek Ötreye (Damma - u064F) çevir
            text = text.replace(/\u064C$/, '\u064F'); 

            // 2. ADIM: Kategoriye göre Elif-Lam ve Şedde/Cezim ekle
            if (category.includes("الشَّمْسِيَّة")) {
                // ŞEMSİ: "اَل" (Elif+Fetha+Lam) + İlk Harf + Şedde + Kelimenin geri kalanı
                // Lam okunmaz ama yazılır, Elif fethalı olur.
                let firstChar = text.charAt(0);
                let restOfWord = text.slice(1);
                
                // Şedde unicode: \u0651
                // BURADA DEĞİŞİKLİK YAPILDI: "ال" yerine "اَل" (Elif üzerinde Fetha)
                wordElement.textContent = "اَل" + firstChar + "\u0651" + restOfWord;
            } else {
                // KAMERİ: "اَلْ" (Elif+Fetha + Lam+Cezim) + Kelime
                // Cezim unicode: \u0652
                // BURADA DEĞİŞİKLİK YAPILDI: "ال" yerine "اَل" (Elif üzerinde Fetha)
                wordElement.textContent = "اَل\u0652" + text;
            }
        }

        // --- SÜRÜKLE BIRAK MANTIĞI ---
        function addDragDropListeners() {
            const draggables = document.querySelectorAll('.word-item:not(.correct)'); 
            const containers = document.querySelectorAll('.category-drop-zone, .word-bank-container');

            draggables.forEach(draggable => {
                draggable.addEventListener('dragstart', (e) => {
                    draggable.classList.add('mouse-dragging'); 
                    e.dataTransfer.setData('text/plain', draggable.id);
                    playSound('touch');
                });
                draggable.addEventListener('dragend', (e) => {
                    e.target.classList.remove('mouse-dragging');
                });
            });

            containers.forEach(container => {
                container.addEventListener('dragover', e => {
                    e.preventDefault();
                    if(container.classList.contains('category-drop-zone')) {
                        container.style.border = '2px dashed #00b300';
                    }
                });
                
                container.addEventListener('dragleave', e => {
                    if(container.classList.contains('category-drop-zone')) {
                        container.style.border = '2px solid var(--accent-color)';
                    }
                });
                
                container.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const id = e.dataTransfer.getData('text/plain');
                    const wordElement = document.getElementById(id);
                    const dropZone = e.target.closest('.category-drop-zone');

                    // Stil temizliği
                    if(dropZone) dropZone.style.border = '2px solid var(--accent-color)';

                    if (!wordElement) return;

                    // Eğer boşluğa değil de bir kutuya bırakıldıysa
                    if (dropZone) {
                        const zoneCategory = dropZone.dataset.category;
                        const wordCategory = wordElement.dataset.wordCat;

                        dropZone.appendChild(wordElement); // Önce bırakılan yere koy

                        if (zoneCategory === wordCategory) {
                            // --- DOĞRU ---
                            handleSuccess(wordElement, zoneCategory);
                        } else {
                            // --- YANLIŞ ---
                            handleMistake(wordElement, dropZone, wordCategory);
                        }
                    } else if (e.target.closest('.word-bank-container')) {
                        // Bankaya geri bırakırsa
                        e.target.closest('.word-bank-container').appendChild(wordElement);
                    }
                });
            });
        }

// --- DOĞRU CEVAP İŞLEMİ ---
        function handleSuccess(wordElement, category) {
            playSound('correct');
            wordElement.classList.add('correct');
            wordElement.classList.remove('incorrect');
            wordElement.draggable = false;
            
            // Metin dönüştürme kodu kaldırıldı. Kelime olduğu gibi kalacak.

            checkGameCompletion();
        }

        // --- YANLIŞ CEVAP VE OTOMATİK DÜZELTME (Animasyonlu) ---
        function handleMistake(wordElement, wrongZone, correctCategory) {
            playSound('incorrect');
            wordElement.classList.add('incorrect'); // Kırmızı ve titreme
            
            // 1. Titreme süresince bekle (0.5 saniye)
            setTimeout(() => {
                // 2. Doğru kutuyu bul
                const correctZone = [...document.querySelectorAll('.category-drop-zone')]
                    .find(zone => zone.dataset.category === correctCategory);
                
                if (correctZone) {
                    animateWordToZone(wordElement, correctZone, correctCategory);
                }
            }, 600);
        }

        // --- UÇMA ANİMASYONU (FLIP Tekniği) ---
        function animateWordToZone(wordElement, targetZone, correctCategory) {
            // 1. Mevcut pozisyonu (Yanlış Kutu) kaydet
            const firstRect = wordElement.getBoundingClientRect();

            // 2. Elementi hedef kutuya (DOM olarak) taşı ama henüz görünümü değişmesin
            targetZone.appendChild(wordElement);

            // 3. Hedef pozisyonu kaydet
            const lastRect = wordElement.getBoundingClientRect();

            // 4. Aradaki farkı hesapla (Invert)
            const deltaX = firstRect.left - lastRect.left;
            const deltaY = firstRect.top - lastRect.top;

            // 5. Elementi görsel olarak eski yerine geri it (Transform ile)
            wordElement.style.transition = 'none';
            wordElement.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            wordElement.classList.add('gliding'); // Z-index yükselt
            wordElement.classList.remove('incorrect'); // Kırmızılığı kaldır (ya da tutabiliriz, tercih meselesi)

            // 6. Tarayıcıya değişikliği işlemesi için zorla (Reflow)
            wordElement.offsetHeight;

            // 7. Animasyonu Başlat (Play): 0'a (yeni yerine) kaydır
            wordElement.style.transition = 'transform 1.0s ease-in-out'; // Yavaşça (1 saniye)
            wordElement.style.transform = `translate(0, 0)`;

            // 8. Animasyon bitince temizlik yap
            setTimeout(() => {
                wordElement.style.transition = '';
                wordElement.style.transform = '';
                wordElement.classList.remove('gliding');
                
                // Artık doğru yerde olduğu için başarı fonksiyonunu çağır
                handleSuccess(wordElement, correctCategory);
            }, 1000); // Transition süresi kadar bekle
        }

        // --- OYUN BİTİŞ KONTROLÜ ---
        function checkGameCompletion() {
            const totalWordsCount = document.querySelectorAll('.word-item').length;
            const correctWordsCount = document.querySelectorAll('.word-item.correct').length;
            
            if (correctWordsCount === totalWordsCount && totalWordsCount > 0) {
                instructionText.textContent = "أَحْسَنْت! لَقَد أَكْمَلْتَ";
                feedbackOverlay.classList.add('game-finished');
                
                currentActivityIndex++;
                if (currentActivityIndex >= activityDataBank.length) currentActivityIndex = 0; 
                
                setTimeout(() => {
                    feedbackIcon.textContent = '✔';
                    feedbackIcon.className = 'correct';
                    feedbackOverlay.classList.add('show');
                }, 500); // Son kelime yerine oturduktan biraz sonra göster
            }
        }
        
        function restartGame() {
            playSound('touch');
            feedbackOverlay.classList.remove('show', 'game-finished'); 
            loadActivity(); 
        }

        function setupFullscreen() {
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            if (!fullscreenBtn) return;
            fullscreenBtn.addEventListener('click', () => {
                const docEl = document.documentElement;
                if(!document.fullscreenElement) {
                    if(docEl.requestFullscreen) docEl.requestFullscreen();
                } else {
                    if(document.exitFullscreen) document.exitFullscreen();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setupFullscreen(); 
        });

    </script>
